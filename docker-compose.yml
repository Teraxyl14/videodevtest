# ============================================================================
# PROJECT AETHER v2.1 - DOCKER COMPOSE
# ============================================================================
# Production configuration: GPU, Redis, vLLM sidecar, volume mounts
# VRAM Architecture: Parallel Residency (~4GB always-on + on-demand)
# ============================================================================

services:
  # ─── Redis (Checkpointing) ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aether_redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: ["redis-server", "--appendonly", "yes"]
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Main Pipeline Worker ──────────────────────────────────────────────
  ml-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: aether-pipeline:v2.1
    container_name: aether_worker

    ports:
      - "8080:8080"   # Dashboard
      - "8002:8002"   # vLLM sidecar (Qwen3.5-0.8B)

    # CRITICAL: nvidia runtime for GPU access
    runtime: nvidia

    # CRITICAL: Required for CUDA IPC between processes
    ipc: host
    shm_size: '1g'

    # CRITICAL: Prevent memory locking issues with pinned CUDA memory
    ulimits:
      memlock: -1
      stack: 67108864  # 64MB

    # GPU Configuration (Blackwell RTX 5080)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu, video ]  # video = NVDEC/NVENC

    # Volume Mounts (all data on M: drive, not C:)
    volumes:
      # Models (large, persistent)
      - ./models:/app/models
      # Input/Output data
      - ./data:/app/data
      - ./input:/app/input
      - ./output:/app/output
      # Downloaded Videos
      - ./downloaded_videos:/app/downloaded_videos
      # Checkpoints (Redis Streams + crash recovery)
      - ./checkpoints:/app/checkpoints
      # Logs (persistent)
      - ./logs:/var/log/pipeline
      # Code (for development hot-reload)
      - ./autonomous_trend_agent:/app/autonomous_trend_agent:ro
      # HuggingFace model cache
      - ./models/huggingface:/app/models/huggingface

      # WSL2 NVDEC/NVENC Library Mounts (CRITICAL for video acceleration)
      - /usr/lib/wsl:/usr/lib/wsl:ro

    # External Environment File
    env_file:
      - .env

    # Environment
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - PYTHONUNBUFFERED=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
      - TORCH_CUDA_ARCH_LIST=12.0
      - INPUT_DIR=/app/input
      - OUTPUT_DIR=/app/output
      - REDIS_URL=redis://redis:6379
      - HF_HOME=/app/models/huggingface
      - TRANSFORMERS_CACHE=/app/models/huggingface
      - TORCH_HOME=/app/models/torch
      - YOLO_CONFIG_DIR=/app/models/ultralytics
      - CRAWL4AI_DATA_DIR=/app/data/crawl4ai

    # Dependencies
    depends_on:
      redis:
        condition: service_healthy

    # Logging (JSON format, rotated)
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

    # Reliability
    restart: always
    stop_grace_period: 60s

    # Override: keep container alive in standby mode
    # Pipeline trigger: docker exec aether_worker python -m autonomous_trend_agent.pipeline.langgraph_pipeline
    # command: [ "tail", "-f", "/dev/null" ]

    healthcheck:
      test: [ "CMD", "python", "-c", "import torch; print(torch.cuda.is_available())" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
